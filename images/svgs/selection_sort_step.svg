<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Selection Sort -- Find Minimum, Swap to Front</text>
  <text x="430" y="50" text-anchor="middle" fill="#555" font-size="13">Scan the unsorted region for the smallest element, swap it into the next sorted position</text>

  <!-- Sorted/unsorted labels -->
  <rect x="100" y="64" width="68" height="20" rx="3" fill="#d5f5e3"/>
  <text x="134" y="78" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">sorted</text>
  <rect x="168" y="64" width="408" height="20" rx="3" fill="#fadbd8"/>
  <text x="372" y="78" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">unsorted region -- scan for minimum</text>

  <!-- Before: [55 | 78, 95, 62, 88, 73] -->
  <text x="40" y="108" fill="#888" font-size="12" font-weight="bold">Before:</text>
  <rect x="100" y="90" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="90" width="60" height="36" rx="4" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
  <text x="198" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="236" y="90" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="266" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <rect x="304" y="90" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="334" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">62</text>
  <rect x="372" y="90" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="402" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">88</text>
  <rect x="440" y="90" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="470" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">73</text>
  <text x="560" y="100" fill="#e67e22" font-size="12">i = 1 (first unsorted position)</text>
  <text x="560" y="116" fill="#e67e22" font-size="12">data[i] = 78</text>

  <!-- Scanning: find min = 62 at index 3 -->
  <text x="40" y="168" fill="#888" font-size="12">Scan:</text>
  <rect x="100" y="150" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="150" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="198" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="236" y="150" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="266" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <rect x="304" y="150" width="60" height="36" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2.5"/>
  <text x="334" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">62</text>
  <rect x="372" y="150" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="402" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">88</text>
  <rect x="440" y="150" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="470" y="173" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">73</text>
  <text x="560" y="162" fill="#e74c3c" font-size="12" font-weight="bold">min found: 62 at index 3</text>
  <text x="560" y="178" fill="#e74c3c" font-size="12">Scanned all 5 unsorted elements</text>

  <!-- After: swap 78 and 62 -->
  <text x="40" y="228" fill="#888" font-size="12" font-weight="bold">After:</text>
  <rect x="100" y="210" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="210" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="198" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">62</text>
  <rect x="236" y="210" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="266" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <rect x="304" y="210" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="334" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="372" y="210" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="402" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">88</text>
  <rect x="440" y="210" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="470" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">73</text>
  <text x="560" y="222" fill="#27ae60" font-size="12" font-weight="bold">swap(data[1], data[3])</text>
  <text x="560" y="238" fill="#27ae60" font-size="12">62 is now in its final position</text>

  <!-- Footer -->
  <rect x="30" y="262" width="800" height="60" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="430" y="282" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Selection sort: always scans the FULL unsorted region -- no shortcuts, always O(n^2)</text>
  <text x="430" y="300" text-anchor="middle" fill="#555" font-size="12">Only n-1 total swaps (one per pass) -- fewer writes than bubble sort</text>
  <text x="430" y="316" text-anchor="middle" fill="#e74c3c" font-size="12">NOT stable: swapping 78 and 62 might reorder equal elements between them</text>
</svg>
