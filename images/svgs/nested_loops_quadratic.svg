<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Why Nested Loops = O(n^2)</text>
  <text x="400" y="50" text-anchor="middle" fill="#555" font-size="13">Each element in the outer loop triggers a scan of the remaining elements</text>

  <!-- Code block -->
  <rect x="40" y="66" width="340" height="140" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="60" y="90" fill="#cba6f7" font-size="13" font-family="Consolas, monospace">for</text>
  <text x="88" y="90" fill="#cdd6f4" font-size="13" font-family="Consolas, monospace">(i = 0; i &lt; n; i++)</text>
  <text x="70" y="110" fill="#6c7086" font-size="12" font-family="Consolas, monospace">// outer: n iterations</text>
  <text x="70" y="134" fill="#cba6f7" font-size="13" font-family="Consolas, monospace">for</text>
  <text x="98" y="134" fill="#cdd6f4" font-size="13" font-family="Consolas, monospace">(j = i+1; j &lt; n; j++)</text>
  <text x="80" y="154" fill="#6c7086" font-size="12" font-family="Consolas, monospace">// inner: ~n iterations</text>
  <text x="80" y="178" fill="#a6e3a1" font-size="13" font-family="Consolas, monospace">compare &amp; maybe swap</text>

  <!-- Math breakdown -->
  <rect x="420" y="66" width="340" height="140" rx="8" fill="#f4f6f7" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="590" y="90" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">Total comparisons:</text>
  <text x="590" y="116" text-anchor="middle" fill="#555" font-size="13">(n-1) + (n-2) + ... + 2 + 1</text>
  <text x="590" y="140" text-anchor="middle" fill="#555" font-size="13">= n(n-1) / 2</text>
  <text x="590" y="168" text-anchor="middle" fill="#e74c3c" font-size="16" font-weight="bold">= O(n^2)</text>
  <text x="590" y="192" text-anchor="middle" fill="#888" font-size="12">When n doubles, work quadruples</text>

  <!-- Growth examples -->
  <rect x="40" y="220" width="720" height="68" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="400" y="242" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Growth in action:</text>
  <text x="140" y="264" text-anchor="middle" fill="#3498db" font-size="13">n = 1,000</text>
  <text x="140" y="280" text-anchor="middle" fill="#3498db" font-size="12">~500,000 ops</text>
  <text x="300" y="264" text-anchor="middle" fill="#e67e22" font-size="13">n = 2,000</text>
  <text x="300" y="280" text-anchor="middle" fill="#e67e22" font-size="12">~2,000,000 ops</text>
  <text x="300" y="264" text-anchor="middle" fill="#e67e22" font-size="13">n = 2,000</text>
  <text x="460" y="264" text-anchor="middle" fill="#e74c3c" font-size="13">n = 10,000</text>
  <text x="460" y="280" text-anchor="middle" fill="#e74c3c" font-size="12">~50,000,000 ops</text>
  <text x="640" y="264" text-anchor="middle" fill="#8e44ad" font-size="13">n = 100,000</text>
  <text x="640" y="280" text-anchor="middle" fill="#8e44ad" font-size="12">~5,000,000,000 ops</text>
</svg>
