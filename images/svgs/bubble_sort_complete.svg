<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 810" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Bubble Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Compare adjacent pairs, swap if out of order. Each pass locks the largest unsorted element at the end.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#3498db"/>
  <text x="618" y="96" fill="#555" font-size="11">Unsorted</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Compared &#x2192; swapped</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#f39c12"/>
  <text x="618" y="132" fill="#555" font-size="11">Compared &#x2192; no swap</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#27ae60"/>
  <text x="618" y="150" fill="#555" font-size="11">Locked in final position</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;)</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#555" font-size="11" font-weight="bold">Stable</text>

  <!-- Input array [5, 2, 8, 1, 4] -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== PASS 1 — DETAILED STEP BY STEP ===== -->
  <rect x="20" y="170" width="860" height="280" rx="8" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <text x="40" y="192" fill="#2980b9" font-size="14" font-weight="bold">Pass 1</text>
  <text x="120" y="192" fill="#777" font-size="11">Compare positions 0&#x2013;3 (inner loop runs 4 times)</text>

  <!-- j=0: compare 5,2 — SWAP -->
  <text x="40" y="220" fill="#2980b9" font-size="12" font-weight="bold">j = 0</text>
  <text x="85" y="220" fill="#888" font-size="11">5 &gt; 2?</text>
  <rect x="155" y="206" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="225" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="207" y="206" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="230" y="225" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="259" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="282" y="225" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="334" y="225" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="363" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="386" y="225" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="220" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; SWAP</text>
  <text x="540" y="220" fill="#555" font-size="11">&#x2192;</text>
  <rect x="570" y="206" width="46" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="593" y="225" text-anchor="middle" fill="#1a5e32" font-size="13">2</text>
  <rect x="622" y="206" width="46" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="645" y="225" text-anchor="middle" fill="#1a5e32" font-size="13">5</text>
  <rect x="674" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="697" y="225" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="726" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="749" y="225" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="778" y="206" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="801" y="225" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <!-- j=1: compare 5,8 — no swap -->
  <text x="40" y="260" fill="#2980b9" font-size="12" font-weight="bold">j = 1</text>
  <text x="85" y="260" fill="#888" font-size="11">5 &lt; 8?</text>
  <rect x="155" y="246" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="178" y="265" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="207" y="246" width="46" height="28" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="230" y="265" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="259" y="246" width="46" height="28" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="282" y="265" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">8</text>
  <rect x="311" y="246" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="334" y="265" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="363" y="246" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="386" y="265" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="260" fill="#e67e22" font-size="12">No &#x2192; already in order</text>

  <!-- j=2: compare 8,1 — SWAP -->
  <text x="40" y="300" fill="#2980b9" font-size="12" font-weight="bold">j = 2</text>
  <text x="85" y="300" fill="#888" font-size="11">8 &gt; 1?</text>
  <rect x="155" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="178" y="305" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="207" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="230" y="305" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="259" y="286" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="282" y="305" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">8</text>
  <rect x="311" y="286" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="334" y="305" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="363" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="386" y="305" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="300" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; SWAP</text>
  <text x="540" y="300" fill="#555" font-size="11">&#x2192;</text>
  <rect x="570" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="593" y="305" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="622" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="645" y="305" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="674" y="286" width="46" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="697" y="305" text-anchor="middle" fill="#1a5e32" font-size="13">1</text>
  <rect x="726" y="286" width="46" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="749" y="305" text-anchor="middle" fill="#1a5e32" font-size="13">8</text>
  <rect x="778" y="286" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="801" y="305" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <!-- j=3: compare 8,4 — SWAP -->
  <text x="40" y="340" fill="#2980b9" font-size="12" font-weight="bold">j = 3</text>
  <text x="85" y="340" fill="#888" font-size="11">8 &gt; 4?</text>
  <rect x="155" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="178" y="345" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="207" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="230" y="345" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="259" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="282" y="345" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="311" y="326" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="334" y="345" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">8</text>
  <rect x="363" y="326" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="386" y="345" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">4</text>
  <text x="425" y="340" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; SWAP</text>
  <text x="540" y="340" fill="#555" font-size="11">&#x2192;</text>
  <rect x="570" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="593" y="345" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="622" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="645" y="345" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="674" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="697" y="345" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="726" y="326" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="749" y="345" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <rect x="778" y="326" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="801" y="345" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">8</text>

  <!-- Pass 1 end result -->
  <text x="40" y="382" fill="#555" font-size="12" font-weight="bold">End of pass:</text>
  <rect x="155" y="368" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="178" y="387" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="207" y="368" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="230" y="387" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="259" y="368" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="282" y="387" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="311" y="368" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="334" y="387" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <rect x="363" y="368" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="386" y="387" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">8</text>
  <text x="425" y="382" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; 8 locked in final position</text>
  <text x="425" y="398" fill="#777" font-size="10">3 swaps &#x2192; swapped = true &#x2192; continue</text>

  <!-- ===== PASS 2 ===== -->
  <rect x="20" y="460" width="860" height="70" rx="8" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <text x="40" y="482" fill="#2980b9" font-size="14" font-weight="bold">Pass 2</text>
  <text x="120" y="482" fill="#777" font-size="11">Positions 0&#x2013;2</text>
  <text x="280" y="482" fill="#888" font-size="11">2&lt;5 &#x2713;  5&gt;1 SWAP  5&gt;4 SWAP</text>

  <!-- Before -->
  <text x="40" y="516" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="121" y="518" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="169" y="518" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="217" y="518" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="244" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="265" y="518" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <rect x="292" y="500" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="518" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>

  <text x="355" y="516" fill="#555" font-size="14">&#x2192;</text>

  <!-- After -->
  <rect x="385" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="406" y="518" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="433" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="454" y="518" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="481" y="500" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="502" y="518" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <rect x="529" y="500" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="550" y="518" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="577" y="500" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="598" y="518" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="632" y="516" fill="#27ae60" font-size="11">&#x2190; 5 locked</text>

  <!-- ===== PASS 3 ===== -->
  <rect x="20" y="540" width="860" height="70" rx="8" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <text x="40" y="562" fill="#2980b9" font-size="14" font-weight="bold">Pass 3</text>
  <text x="120" y="562" fill="#777" font-size="11">Positions 0&#x2013;1</text>
  <text x="280" y="562" fill="#888" font-size="11">2&gt;1 SWAP  2&lt;4 &#x2713;</text>

  <!-- Before -->
  <text x="40" y="596" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="580" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="121" y="598" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="580" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="169" y="598" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="196" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>

  <text x="355" y="596" fill="#555" font-size="14">&#x2192;</text>

  <!-- After -->
  <rect x="385" y="580" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="406" y="598" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="433" y="580" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="454" y="598" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="481" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="502" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="529" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="550" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="577" y="580" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="598" y="598" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="632" y="596" fill="#27ae60" font-size="11">&#x2190; 4 locked</text>

  <!-- ===== PASS 4 (early exit) ===== -->
  <rect x="20" y="620" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="642" fill="#27ae60" font-size="14" font-weight="bold">Pass 4</text>
  <text x="120" y="642" fill="#777" font-size="11">Position 0</text>
  <text x="280" y="642" fill="#888" font-size="11">1&lt;2 &#x2713;</text>
  <text x="350" y="642" fill="#27ae60" font-size="12" font-weight="bold">No swaps &#x2192; EARLY EXIT!</text>

  <!-- Before = After (already sorted) -->
  <text x="40" y="676" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="660" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="678" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="660" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="678" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="660" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="678" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="660" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="678" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="660" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="678" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="355" y="676" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted!</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="706" width="860" height="106" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="730" text-anchor="middle" fill="#1a5276" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="752" fill="#2c3e50" font-size="12">&#x2022; Each pass guarantees the next-largest element reaches its final position</text>
  <text x="50" y="772" fill="#2c3e50" font-size="12">&#x2022; Inner loop shrinks by 1 each pass: n&#x2212;1, n&#x2212;2, ... comparisons = n(n&#x2212;1)/2 = <tspan font-weight="bold">O(n&#xB2;)</tspan></text>
  <text x="50" y="792" fill="#2c3e50" font-size="12">&#x2022; <tspan font-weight="bold">Early exit:</tspan> if no swaps occur in a pass, the array is sorted &#x2192; best case <tspan font-weight="bold">O(n)</tspan></text>
</svg>
