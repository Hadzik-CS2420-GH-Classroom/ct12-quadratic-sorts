<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 830" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Insertion Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Build a sorted region left-to-right. Each new element slides into its correct position.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#8e44ad"/>
  <text x="618" y="96" fill="#555" font-size="11">Key (being inserted)</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Shifted right (larger than key)</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#2ecc71"/>
  <text x="618" y="132" fill="#555" font-size="11">Sorted region</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#bdc3c7"/>
  <text x="618" y="150" fill="#555" font-size="11">Unsorted (waiting)</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;)</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#555" font-size="11" font-weight="bold">Stable</text>

  <!-- Input array [5, 2, 8, 1, 4] -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== i=1, key=2 — DETAILED STEP BY STEP ===== -->
  <rect x="20" y="190" width="860" height="200" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="212" fill="#8e44ad" font-size="14" font-weight="bold">i = 1, key = 2</text>
  <text x="170" y="212" fill="#777" font-size="11">Save key, compare with sorted region right-to-left, shift larger elements</text>

  <!-- Start state: sorted [5] | key [2] | unsorted [8, 1, 4] -->
  <text x="40" y="242" fill="#888" font-size="12" font-weight="bold">Start:</text>
  <rect x="155" y="228" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="178" y="247" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <line x1="205" y1="228" x2="205" y2="256" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="211" y="228" width="46" height="28" rx="4" fill="#8e44ad"/>
  <text x="234" y="247" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="263" y="228" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="286" y="247" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="228" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="338" y="247" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="367" y="228" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="390" y="247" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="242" fill="#8e44ad" font-size="11">key = 2 (saved)</text>

  <!-- j=0: compare 5 > 2? Yes → shift 5 right -->
  <text x="40" y="282" fill="#8e44ad" font-size="12" font-weight="bold">j = 0</text>
  <text x="85" y="282" fill="#888" font-size="11">5 &gt; 2?</text>
  <rect x="155" y="268" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="287" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="211" y="268" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="234" y="287" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">gap</text>
  <rect x="263" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="286" y="287" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="338" y="287" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="367" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="390" y="287" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="282" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; shift 5 right</text>

  <text x="540" y="282" fill="#555" font-size="11">&#x2192;</text>
  <rect x="570" y="268" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="593" y="287" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">gap</text>
  <rect x="622" y="268" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="645" y="287" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="674" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="697" y="287" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="726" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="749" y="287" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="778" y="268" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="801" y="287" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <!-- j=-1: stop, place key at index 0 -->
  <text x="40" y="322" fill="#8e44ad" font-size="12" font-weight="bold">j = -1</text>
  <text x="85" y="322" fill="#888" font-size="11">Stop!</text>
  <text x="430" y="322" fill="#8e44ad" font-size="12" font-weight="bold">Place key at data[j+1] = data[0]</text>

  <!-- End of i=1 -->
  <text x="40" y="378" fill="#555" font-size="12" font-weight="bold">End:</text>
  <rect x="155" y="362" width="46" height="28" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="381" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="207" y="362" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="230" y="381" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <line x1="257" y1="362" x2="257" y2="390" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="263" y="362" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="286" y="381" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="362" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="338" y="381" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="367" y="362" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="390" y="381" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="378" fill="#27ae60" font-size="11" font-weight="bold">1 shift &#x2014; 2 inserted at front</text>

  <!-- ===== i=2, key=8 — COMPACT ===== -->
  <rect x="20" y="400" width="860" height="70" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="422" fill="#8e44ad" font-size="14" font-weight="bold">i = 2, key = 8</text>
  <text x="170" y="422" fill="#777" font-size="11">8 &gt; 5? Already in position</text>
  <text x="380" y="422" fill="#f39c12" font-size="12">No shifts needed &#x2014; best case!</text>

  <text x="40" y="456" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="440" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="458" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="440" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="458" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="440" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="217" y="458" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <rect x="244" y="440" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="265" y="458" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="292" y="440" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="458" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="355" y="456" fill="#555" font-size="14">&#x2192;</text>

  <rect x="385" y="440" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="406" y="458" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="433" y="440" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="454" y="458" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="481" y="440" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="502" y="458" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="529" y="440" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="550" y="458" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="577" y="440" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="598" y="458" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="632" y="456" fill="#27ae60" font-size="11">0 shifts</text>

  <!-- ===== i=3, key=1 — COMPACT ===== -->
  <rect x="20" y="480" width="860" height="70" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="502" fill="#8e44ad" font-size="14" font-weight="bold">i = 3, key = 1</text>
  <text x="170" y="502" fill="#777" font-size="11">1 &lt; everything</text>
  <text x="310" y="502" fill="#e74c3c" font-size="11">8&gt;1 shift  5&gt;1 shift  2&gt;1 shift</text>
  <text x="560" y="502" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 0</text>

  <text x="40" y="536" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="538" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="538" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="217" y="538" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="520" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="265" y="538" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="292" y="520" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="538" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="355" y="536" fill="#555" font-size="14">&#x2192;</text>

  <rect x="385" y="520" width="42" height="26" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="406" y="538" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="433" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="454" y="538" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="481" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="502" y="538" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="529" y="520" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="550" y="538" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="577" y="520" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="598" y="538" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="632" y="536" fill="#e74c3c" font-size="11" font-weight="bold">3 shifts (worst!)</text>

  <!-- ===== i=4, key=4 — COMPACT ===== -->
  <rect x="20" y="560" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="582" fill="#8e44ad" font-size="14" font-weight="bold">i = 4, key = 4</text>
  <text x="170" y="582" fill="#777" font-size="11">4 slides past 8 and 5, stops at 2</text>
  <text x="400" y="582" fill="#e74c3c" font-size="11">8&gt;4 shift  5&gt;4 shift</text>
  <text x="540" y="582" fill="#27ae60" font-size="11">2&lt;4 stop!</text>
  <text x="620" y="582" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 2</text>

  <text x="40" y="616" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="600" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="618" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="600" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="618" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="600" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="618" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="600" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="618" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="600" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="618" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="355" y="616" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted! (2 shifts)</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="650" width="860" height="126" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="674" text-anchor="middle" fill="#4a235a" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="698" fill="#2c3e50" font-size="12">&#x2022; Save the key, shift larger elements right, place key at the gap &#x2014; <tspan font-weight="bold">no swaps, just shifts</tspan></text>
  <text x="50" y="718" fill="#2c3e50" font-size="12">&#x2022; Worst case (reverse sorted): each element shifts all the way left = 1+2+...+(n&#x2212;1) = <tspan font-weight="bold">O(n&#xB2;)</tspan></text>
  <text x="50" y="738" fill="#2c3e50" font-size="12">&#x2022; Best case (already sorted): zero shifts per element = <tspan font-weight="bold">O(n)</tspan> &#x2014; fastest quadratic sort on sorted data</text>
  <text x="50" y="758" fill="#2c3e50" font-size="12">&#x2022; <tspan font-weight="bold">Stable:</tspan> uses <tspan font-family="Consolas, monospace">&gt;</tspan> not <tspan font-family="Consolas, monospace">&gt;=</tspan>, so equal elements never pass each other</text>
</svg>
