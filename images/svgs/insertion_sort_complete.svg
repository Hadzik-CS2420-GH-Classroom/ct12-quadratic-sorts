<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Insertion Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Build a sorted region left-to-right. Each new element slides into its correct position.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#8e44ad"/>
  <text x="618" y="96" fill="#555" font-size="11">Key (being inserted)</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Shifted right (larger than key)</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#2ecc71"/>
  <text x="618" y="132" fill="#555" font-size="11">Sorted region</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#bdc3c7"/>
  <text x="618" y="150" fill="#555" font-size="11">Unsorted (waiting)</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;)</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#555" font-size="11" font-weight="bold">Stable</text>

  <!-- Input array [5, 2, 8, 1, 4] -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== i=1, key=2 — DETAILED STEP BY STEP ===== -->
  <rect x="20" y="190" width="860" height="290" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="212" fill="#8e44ad" font-size="14" font-weight="bold">i = 1, key = 2</text>
  <text x="170" y="212" fill="#777" font-size="11">Save key first, then compare with sorted region right-to-left</text>

  <!-- Step 1: SAVE the key — extract it from the array -->
  <text x="40" y="240" fill="#8e44ad" font-size="12" font-weight="bold">Save key:</text>

  <!-- Key extracted above the array -->
  <rect x="211" y="228" width="46" height="28" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="234" y="247" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <text x="270" y="243" fill="#8e44ad" font-size="11" font-weight="bold">&#x2190; saved in temp variable</text>

  <!-- Array with empty slot where key was -->
  <rect x="155" y="262" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="178" y="281" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="211" y="262" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="234" y="281" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">empty</text>
  <rect x="267" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="290" y="281" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="323" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="346" y="281" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="379" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="402" y="281" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="440" y="277" fill="#777" font-size="10">key&#x2019;s slot is now free for shifting</text>

  <!-- Step 2: j=0, compare 5 > key(2)? Yes → shift 5 right into the gap -->
  <text x="40" y="314" fill="#8e44ad" font-size="12" font-weight="bold">j = 0</text>
  <text x="85" y="314" fill="#888" font-size="11">5 &gt; key(2)?</text>
  <text x="200" y="314" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; shift 5 right into the gap</text>

  <!-- Before shift -->
  <rect x="155" y="324" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="343" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="211" y="324" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="234" y="343" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">empty</text>
  <rect x="267" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="290" y="343" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="323" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="346" y="343" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="379" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="402" y="343" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <text x="435" y="340" fill="#555" font-size="14">&#x2192;</text>

  <!-- After shift: gap moved left -->
  <rect x="460" y="324" width="44" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="482" y="343" text-anchor="middle" fill="#bbb" font-size="10" font-style="italic">empty</text>
  <rect x="510" y="324" width="44" height="28" rx="4" fill="#e74c3c"/>
  <text x="532" y="343" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="560" y="324" width="44" height="28" rx="4" fill="#bdc3c7"/>
  <text x="582" y="343" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="610" y="324" width="44" height="28" rx="4" fill="#bdc3c7"/>
  <text x="632" y="343" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="660" y="324" width="44" height="28" rx="4" fill="#bdc3c7"/>
  <text x="682" y="343" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="715" y="340" fill="#888" font-size="10">gap moved left</text>

  <!-- Step 3: j=-1, stop — place key in the gap -->
  <text x="40" y="382" fill="#8e44ad" font-size="12" font-weight="bold">j = -1</text>
  <text x="85" y="382" fill="#888" font-size="11">Stop! Place key in the gap</text>

  <!-- Before: gap at index 0 -->
  <rect x="155" y="392" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="178" y="411" text-anchor="middle" fill="#bbb" font-size="10" font-style="italic">empty</text>
  <rect x="207" y="392" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="230" y="411" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="259" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="282" y="411" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="334" y="411" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="363" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="386" y="411" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <text x="425" y="408" fill="#555" font-size="14">&#x2192;</text>

  <!-- After: key placed -->
  <rect x="455" y="392" width="46" height="28" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="478" y="411" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="507" y="392" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="530" y="411" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="559" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="582" y="411" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="611" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="634" y="411" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="663" y="392" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="686" y="411" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="720" y="408" fill="#8e44ad" font-size="10" font-weight="bold">key placed!</text>

  <!-- End of i=1 -->
  <text x="40" y="450" fill="#555" font-size="12" font-weight="bold">End:</text>
  <rect x="155" y="436" width="46" height="28" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="207" y="436" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="230" y="455" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <line x1="257" y1="436" x2="257" y2="464" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="263" y="436" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="286" y="455" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="436" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="338" y="455" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="367" y="436" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="390" y="455" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="450" fill="#27ae60" font-size="11" font-weight="bold">Sorted region: [2, 5] &#x2014; 1 shift</text>

  <!-- ===== i=2, key=8 — COMPACT ===== -->
  <rect x="20" y="500" width="860" height="70" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="522" fill="#8e44ad" font-size="14" font-weight="bold">i = 2, key = 8</text>
  <text x="170" y="522" fill="#777" font-size="11">8 &gt; 5? Already in position</text>
  <text x="380" y="522" fill="#f39c12" font-size="12">No shifts needed &#x2014; best case!</text>

  <text x="40" y="556" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="540" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="558" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="540" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="558" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="540" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="217" y="558" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <rect x="244" y="540" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="265" y="558" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="292" y="540" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="558" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="355" y="556" fill="#555" font-size="14">&#x2192;</text>

  <rect x="385" y="540" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="406" y="558" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="433" y="540" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="454" y="558" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="481" y="540" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="502" y="558" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="529" y="540" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="550" y="558" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="577" y="540" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="598" y="558" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="632" y="556" fill="#27ae60" font-size="11">0 shifts</text>

  <!-- ===== i=3, key=1 — DETAILED (3 shifts, worst case) ===== -->
  <rect x="20" y="580" width="860" height="220" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="602" fill="#8e44ad" font-size="14" font-weight="bold">i = 3, key = 1</text>
  <text x="170" y="602" fill="#777" font-size="11">1 is smaller than everything &#x2014; the gap travels all the way to index 0</text>

  <!-- Save key -->
  <text x="40" y="626" fill="#8e44ad" font-size="12" font-weight="bold">Save key:</text>
  <rect x="244" y="614" width="42" height="26" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="265" y="632" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <text x="300" y="629" fill="#8e44ad" font-size="10">&#x2190; saved</text>
  <rect x="100" y="614" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="632" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="614" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="632" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="614" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="217" y="632" text-anchor="middle" fill="#fff" font-size="12">8</text>

  <!-- j=2: 8>1 shift -->
  <text x="40" y="660" fill="#8e44ad" font-size="11" font-weight="bold">j=2</text>
  <text x="70" y="660" fill="#888" font-size="11">8&gt;1?</text>
  <text x="115" y="660" fill="#e74c3c" font-size="11" font-weight="bold">shift 8 right</text>
  <text x="250" y="660" fill="#555" font-size="11">[2, 5, <tspan fill="#ecf0f1">_</tspan>, 8, 4]</text>
  <text x="400" y="660" fill="#888" font-size="10">gap at index 2</text>

  <!-- j=1: 5>1 shift -->
  <text x="40" y="682" fill="#8e44ad" font-size="11" font-weight="bold">j=1</text>
  <text x="70" y="682" fill="#888" font-size="11">5&gt;1?</text>
  <text x="115" y="682" fill="#e74c3c" font-size="11" font-weight="bold">shift 5 right</text>
  <text x="250" y="682" fill="#555" font-size="11">[2, <tspan fill="#ecf0f1">_</tspan>, 5, 8, 4]</text>
  <text x="400" y="682" fill="#888" font-size="10">gap at index 1</text>

  <!-- j=0: 2>1 shift -->
  <text x="40" y="704" fill="#8e44ad" font-size="11" font-weight="bold">j=0</text>
  <text x="70" y="704" fill="#888" font-size="11">2&gt;1?</text>
  <text x="115" y="704" fill="#e74c3c" font-size="11" font-weight="bold">shift 2 right</text>
  <text x="250" y="704" fill="#555" font-size="11">[<tspan fill="#ecf0f1">_</tspan>, 2, 5, 8, 4]</text>
  <text x="400" y="704" fill="#888" font-size="10">gap at index 0</text>

  <!-- j=-1: stop, place key -->
  <text x="40" y="726" fill="#8e44ad" font-size="11" font-weight="bold">j=-1</text>
  <text x="70" y="726" fill="#888" font-size="11">Stop!</text>
  <text x="115" y="726" fill="#8e44ad" font-size="11" font-weight="bold">Place key at data[0]</text>

  <!-- End result -->
  <text x="40" y="762" fill="#555" font-size="11" font-weight="bold">End:</text>
  <rect x="100" y="748" width="42" height="26" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="766" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="748" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="766" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="196" y="748" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="217" y="766" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="244" y="748" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="265" y="766" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="292" y="748" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="766" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="355" y="762" fill="#e74c3c" font-size="11" font-weight="bold">3 shifts &#x2014; gap traveled from index 3 to 0</text>

  <!-- ===== i=4, key=4 — COMPACT ===== -->
  <rect x="20" y="810" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="832" fill="#8e44ad" font-size="14" font-weight="bold">i = 4, key = 4</text>
  <text x="170" y="832" fill="#e74c3c" font-size="11">8&gt;4  5&gt;4 &#x2192; 2 shifts</text>
  <text x="330" y="832" fill="#27ae60" font-size="11">2&lt;4 stop!</text>
  <text x="420" y="832" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 2</text>

  <text x="40" y="866" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="850" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="868" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="850" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="868" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="850" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="868" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="850" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="868" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="850" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="868" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="355" y="866" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted! (2 shifts)</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="900" width="860" height="106" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="924" text-anchor="middle" fill="#4a235a" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="948" fill="#2c3e50" font-size="12">&#x2022; Save the key, shift larger elements right &#x2014; the gap travels left until the key finds its spot</text>
  <text x="50" y="968" fill="#2c3e50" font-size="12">&#x2022; Worst case (reverse sorted): gap travels all the way to index 0 every time = <tspan font-weight="bold">O(n&#xB2;)</tspan></text>
  <text x="50" y="988" fill="#2c3e50" font-size="12">&#x2022; Best case (already sorted): zero shifts per element = <tspan font-weight="bold">O(n)</tspan> &#x2014; fastest quadratic sort on sorted data</text>
</svg>
