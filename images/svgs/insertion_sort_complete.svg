<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Insertion Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Build a sorted region left-to-right. Each new element slides into its correct position.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#8e44ad"/>
  <text x="618" y="96" fill="#555" font-size="11">Key (being inserted)</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Shifted right (larger than key)</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#2ecc71"/>
  <text x="618" y="132" fill="#555" font-size="11">Sorted region</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#bdc3c7"/>
  <text x="618" y="150" fill="#555" font-size="11">Unsorted (waiting)</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;)</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#555" font-size="11" font-weight="bold">Stable</text>

  <!-- Input array [5, 2, 8, 1, 4] -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== i=1, key=2 — DETAILED STEP BY STEP ===== -->
  <rect x="20" y="190" width="860" height="250" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="212" fill="#8e44ad" font-size="14" font-weight="bold">i = 1, key = 2</text>
  <text x="170" y="212" fill="#777" font-size="11">Save key first, then compare with sorted region right-to-left</text>

  <!-- Step 1: SAVE the key — extract it from the array -->
  <text x="40" y="240" fill="#8e44ad" font-size="12" font-weight="bold">Save key:</text>

  <!-- Key extracted above the array -->
  <rect x="211" y="228" width="46" height="28" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="234" y="247" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <text x="270" y="243" fill="#8e44ad" font-size="11" font-weight="bold">&#x2190; saved in temp variable</text>

  <!-- Array with empty slot where key was -->
  <rect x="155" y="262" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="178" y="281" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="211" y="262" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="234" y="281" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">empty</text>
  <rect x="267" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="290" y="281" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="323" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="346" y="281" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="379" y="262" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="402" y="281" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="440" y="277" fill="#777" font-size="10">key&#x2019;s slot is now free for shifting</text>

  <!-- Step 2: j=0, compare 5 > key(2)? Yes → shift 5 right into the gap -->
  <text x="40" y="314" fill="#8e44ad" font-size="12" font-weight="bold">j = 0</text>
  <text x="85" y="314" fill="#888" font-size="11">5 &gt; key(2)?</text>
  <text x="200" y="314" fill="#e74c3c" font-size="12" font-weight="bold">Yes &#x2192; shift 5 right into the gap</text>

  <!-- Before shift -->
  <rect x="155" y="324" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="343" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="211" y="324" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="234" y="343" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">empty</text>
  <rect x="267" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="290" y="343" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="323" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="346" y="343" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="379" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="402" y="343" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <text x="440" y="340" fill="#555" font-size="14">&#x2192;</text>

  <!-- After shift: gap moved left -->
  <rect x="470" y="324" width="46" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="493" y="343" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">empty</text>
  <rect x="526" y="324" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="549" y="343" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="582" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="605" y="343" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="638" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="661" y="343" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="694" y="324" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="717" y="343" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="755" y="340" fill="#888" font-size="10">gap moved left</text>

  <!-- Step 3: j=-1, stop — place key in the gap -->
  <text x="40" y="378" fill="#8e44ad" font-size="12" font-weight="bold">j = -1</text>
  <text x="85" y="378" fill="#888" font-size="11">Stop! Place key in the gap</text>

  <!-- Key drops into gap -->
  <rect x="155" y="388" width="46" height="28" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="178" y="407" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <text x="215" y="403" fill="#8e44ad" font-size="11">&#x2190; key placed at data[0]</text>

  <!-- End of i=1 -->
  <text x="40" y="432" fill="#555" font-size="12" font-weight="bold">End:</text>
  <rect x="155" y="418" width="46" height="28" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="437" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="207" y="418" width="46" height="28" rx="4" fill="#2ecc71"/>
  <text x="230" y="437" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <line x1="257" y1="418" x2="257" y2="446" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="263" y="418" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="286" y="437" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="418" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="338" y="437" text-anchor="middle" fill="#fff" font-size="13">1</text>
  <rect x="367" y="418" width="46" height="28" rx="4" fill="#bdc3c7"/>
  <text x="390" y="437" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="432" fill="#27ae60" font-size="11" font-weight="bold">Sorted region: [2, 5] &#x2014; 1 shift</text>

  <!-- ===== i=2, key=8 — COMPACT ===== -->
  <rect x="20" y="450" width="860" height="70" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="472" fill="#8e44ad" font-size="14" font-weight="bold">i = 2, key = 8</text>
  <text x="170" y="472" fill="#777" font-size="11">8 &gt; 5? Already in position</text>
  <text x="380" y="472" fill="#f39c12" font-size="12">No shifts needed &#x2014; best case!</text>

  <text x="40" y="506" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="490" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="508" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="490" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="508" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="490" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="217" y="508" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <rect x="244" y="490" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="265" y="508" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="292" y="490" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="508" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="355" y="506" fill="#555" font-size="14">&#x2192;</text>

  <rect x="385" y="490" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="406" y="508" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="433" y="490" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="454" y="508" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="481" y="490" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="502" y="508" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="529" y="490" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="550" y="508" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="577" y="490" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="598" y="508" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="632" y="506" fill="#27ae60" font-size="11">0 shifts</text>

  <!-- ===== i=3, key=1 — COMPACT ===== -->
  <rect x="20" y="530" width="860" height="70" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="552" fill="#8e44ad" font-size="14" font-weight="bold">i = 3, key = 1</text>
  <text x="170" y="552" fill="#777" font-size="11">1 &lt; everything</text>
  <text x="310" y="552" fill="#e74c3c" font-size="11">8&gt;1 shift  5&gt;1 shift  2&gt;1 shift</text>
  <text x="560" y="552" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 0</text>

  <text x="40" y="586" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="121" y="588" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="148" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="169" y="588" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="196" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="217" y="588" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="570" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="265" y="588" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="292" y="570" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="313" y="588" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="355" y="586" fill="#555" font-size="14">&#x2192;</text>

  <rect x="385" y="570" width="42" height="26" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="406" y="588" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="433" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="454" y="588" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="481" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="502" y="588" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="529" y="570" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="550" y="588" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="577" y="570" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="598" y="588" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="632" y="586" fill="#e74c3c" font-size="11" font-weight="bold">3 shifts (worst!)</text>

  <!-- ===== i=4, key=4 — COMPACT ===== -->
  <rect x="20" y="610" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="632" fill="#8e44ad" font-size="14" font-weight="bold">i = 4, key = 4</text>
  <text x="170" y="632" fill="#777" font-size="11">4 slides past 8 and 5, stops at 2</text>
  <text x="400" y="632" fill="#e74c3c" font-size="11">8&gt;4 shift  5&gt;4 shift</text>
  <text x="540" y="632" fill="#27ae60" font-size="11">2&lt;4 stop!</text>
  <text x="620" y="632" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 2</text>

  <text x="40" y="666" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="650" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="668" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="650" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="668" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="650" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="668" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="650" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="668" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="650" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="668" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="355" y="666" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted! (2 shifts)</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="700" width="860" height="106" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="724" text-anchor="middle" fill="#4a235a" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="748" fill="#2c3e50" font-size="12">&#x2022; Save the key in a temp variable, shift larger elements right, place key in the gap</text>
  <text x="50" y="768" fill="#2c3e50" font-size="12">&#x2022; Worst case (reverse sorted): each element shifts all the way left = <tspan font-weight="bold">O(n&#xB2;)</tspan></text>
  <text x="50" y="788" fill="#2c3e50" font-size="12">&#x2022; Best case (already sorted): zero shifts per element = <tspan font-weight="bold">O(n)</tspan> &#x2014; fastest quadratic sort on sorted data</text>
</svg>
