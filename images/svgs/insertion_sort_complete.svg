<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Insertion Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Build a sorted region left-to-right. Each new element slides into its correct position.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="80" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="84" width="20" height="14" rx="3" fill="#8e44ad"/>
  <text x="622" y="95" fill="#555" font-size="11">Key (element being inserted)</text>
  <rect x="596" y="104" width="20" height="14" rx="3" fill="#2ecc71"/>
  <text x="622" y="115" fill="#555" font-size="11">Sorted region</text>
  <rect x="596" y="124" width="20" height="14" rx="3" fill="#bdc3c7"/>
  <text x="622" y="135" fill="#555" font-size="11">Unsorted (waiting)</text>
  <text x="740" y="95" fill="#555" font-size="11" font-weight="bold">Time: O(n&#xB2;)</text>
  <text x="740" y="115" fill="#555" font-size="11" font-weight="bold">Space: O(1)</text>
  <text x="740" y="135" fill="#555" font-size="11" font-weight="bold">Stable: Yes</text>

  <!-- Input -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== STEP 1: i=1, key=2 ===== -->
  <rect x="20" y="120" width="860" height="88" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="142" fill="#8e44ad" font-size="14" font-weight="bold">i = 1, key = 2</text>
  <text x="170" y="142" fill="#777" font-size="11">Compare key with sorted region, shift larger elements right</text>

  <!-- Before -->
  <text x="40" y="164" fill="#888" font-size="11">Before:</text>
  <rect x="110" y="150" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="131" y="168" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <line x1="156" y1="150" x2="156" y2="176" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="162" y="150" width="42" height="26" rx="4" fill="#8e44ad"/>
  <text x="183" y="168" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="210" y="150" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="231" y="168" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="258" y="150" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="279" y="168" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="306" y="150" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="327" y="168" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="370" y="164" fill="#e74c3c" font-size="11">5 &gt; 2 &#x2192; shift 5 right</text>

  <!-- After -->
  <text x="40" y="196" fill="#888" font-size="11">After:</text>
  <rect x="110" y="182" width="42" height="26" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="131" y="200" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="158" y="182" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="179" y="200" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <line x1="204" y1="182" x2="204" y2="208" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="210" y="182" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="231" y="200" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="258" y="182" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="279" y="200" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="306" y="182" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="327" y="200" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="370" y="196" fill="#8e44ad" font-size="11" font-weight="bold">2 placed at index 0 (1 shift)</text>

  <!-- ===== STEP 2: i=2, key=8 ===== -->
  <rect x="20" y="218" width="860" height="56" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="240" fill="#8e44ad" font-size="14" font-weight="bold">i = 2, key = 8</text>
  <text x="170" y="240" fill="#777" font-size="11">8 &gt; 5? Already in position &#x2014; no shifts needed</text>

  <text x="40" y="262" fill="#888" font-size="11">Result:</text>
  <rect x="110" y="248" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="131" y="266" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="158" y="248" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="179" y="266" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="206" y="248" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="227" y="266" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <line x1="252" y1="248" x2="252" y2="274" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="258" y="248" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="279" y="266" text-anchor="middle" fill="#fff" font-size="12">1</text>
  <rect x="306" y="248" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="327" y="266" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="370" y="262" fill="#27ae60" font-size="11" font-weight="bold">0 shifts &#x2014; best case for this element!</text>

  <!-- ===== STEP 3: i=3, key=1 ===== -->
  <rect x="20" y="284" width="860" height="88" rx="8" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="306" fill="#8e44ad" font-size="14" font-weight="bold">i = 3, key = 1</text>
  <text x="170" y="306" fill="#777" font-size="11">1 is smaller than everything &#x2014; shifts all 3 sorted elements right</text>

  <text x="40" y="328" fill="#888" font-size="11">Shifts:</text>
  <text x="100" y="328" fill="#e74c3c" font-size="11">8&gt;1 &#x2192; shift</text>
  <text x="190" y="328" fill="#e74c3c" font-size="11">5&gt;1 &#x2192; shift</text>
  <text x="280" y="328" fill="#e74c3c" font-size="11">2&gt;1 &#x2192; shift</text>
  <text x="370" y="328" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 0</text>

  <text x="40" y="360" fill="#888" font-size="11">Result:</text>
  <rect x="110" y="346" width="42" height="26" rx="4" fill="#2ecc71" stroke="#1e8449" stroke-width="2"/>
  <text x="131" y="364" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="158" y="346" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="179" y="364" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="206" y="346" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="227" y="364" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="254" y="346" width="42" height="26" rx="4" fill="#2ecc71"/>
  <text x="275" y="364" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <line x1="300" y1="346" x2="300" y2="372" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="306" y="346" width="42" height="26" rx="4" fill="#bdc3c7"/>
  <text x="327" y="364" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="370" y="360" fill="#e74c3c" font-size="11" font-weight="bold">3 shifts &#x2014; worst case for this element!</text>

  <!-- ===== STEP 4: i=4, key=4 ===== -->
  <rect x="20" y="382" width="860" height="88" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="404" fill="#8e44ad" font-size="14" font-weight="bold">i = 4, key = 4</text>
  <text x="170" y="404" fill="#777" font-size="11">4 slides past 8 and 5, stops at 2 (2 &lt; 4)</text>

  <text x="40" y="426" fill="#888" font-size="11">Shifts:</text>
  <text x="100" y="426" fill="#e74c3c" font-size="11">8&gt;4 &#x2192; shift</text>
  <text x="190" y="426" fill="#e74c3c" font-size="11">5&gt;4 &#x2192; shift</text>
  <text x="280" y="426" fill="#27ae60" font-size="11">2&lt;4 &#x2192; stop!</text>
  <text x="370" y="426" fill="#8e44ad" font-size="11" font-weight="bold">Place at index 2</text>

  <text x="40" y="458" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="110" y="444" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="131" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="158" y="444" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="179" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="206" y="444" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="227" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="254" y="444" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="275" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="302" y="444" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="323" y="462" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="370" y="458" fill="#27ae60" font-size="11">&#x2190; all sorted! (2 shifts)</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="500" width="860" height="130" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="524" text-anchor="middle" fill="#4a235a" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="548" fill="#2c3e50" font-size="12">&#x2022; Save the key, shift larger elements right, place key at the gap &#x2014; <tspan font-weight="bold">no swaps, just shifts</tspan></text>
  <text x="50" y="568" fill="#2c3e50" font-size="12">&#x2022; Worst case (reverse sorted): each element shifts all the way left = 1+2+...+(n&#x2212;1) = <tspan font-weight="bold">O(n&#xB2;)</tspan></text>
  <text x="50" y="588" fill="#2c3e50" font-size="12">&#x2022; Best case (already sorted): each element is already in position = <tspan font-weight="bold">O(n)</tspan> &#x2014; fastest quadratic sort on sorted data</text>
  <text x="50" y="608" fill="#2c3e50" font-size="12">&#x2022; <tspan font-weight="bold">Stable:</tspan> uses <tspan font-family="Consolas, monospace">&gt;</tspan> not <tspan font-family="Consolas, monospace">&gt;=</tspan>, so equal elements never pass each other</text>
  <text x="50" y="628" fill="#2c3e50" font-size="12">&#x2022; Used as the base case inside std::sort (for n &#x2264; 16) because it&#x2019;s fast on small arrays</text>
</svg>
