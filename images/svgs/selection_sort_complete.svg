<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 960" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Selection Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Find the minimum in the unsorted region, swap it into the next sorted position. Repeat.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#e67e22"/>
  <text x="618" y="96" fill="#555" font-size="11">Unsorted (scanning)</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Minimum found</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#27ae60"/>
  <text x="618" y="132" fill="#555" font-size="11">Locked in final position</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#3498db"/>
  <text x="618" y="150" fill="#555" font-size="11">Swapped into position</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;) always</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#e74c3c" font-size="11" font-weight="bold">Not stable</text>

  <!-- Input array -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== i=0 — DETAILED ===== -->
  <rect x="20" y="190" width="860" height="324" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="212" fill="#e67e22" font-size="14" font-weight="bold">i = 0</text>
  <text x="100" y="212" fill="#777" font-size="11">Scan entire array for minimum, then swap it to index 0</text>

  <!-- Scan step-by-step: assume min_idx=0, then check each element -->
  <text x="40" y="238" fill="#e67e22" font-size="12" font-weight="bold">Scan:</text>
  <text x="100" y="238" fill="#888" font-size="11">Start with min_idx = 0 (value 5), then compare every other element</text>

  <!-- j=1: 2 < 5? Yes → update min_idx=1 -->
  <text x="40" y="262" fill="#e67e22" font-size="11" font-weight="bold">j = 1</text>
  <text x="80" y="262" fill="#888" font-size="11">2 &lt; 5?</text>
  <text x="140" y="262" fill="#e74c3c" font-size="11" font-weight="bold">Yes &#x2192; update min_idx = 1</text>
  <text x="360" y="262" fill="#888" font-size="10">(current min is now 2)</text>

  <!-- j=2: 8 < 2? No -->
  <text x="40" y="282" fill="#e67e22" font-size="11" font-weight="bold">j = 2</text>
  <text x="80" y="282" fill="#888" font-size="11">8 &lt; 2?</text>
  <text x="140" y="282" fill="#f39c12" font-size="11">No &#x2192; min_idx stays 1</text>

  <!-- j=3: 1 < 2? Yes → update min_idx=3 -->
  <text x="40" y="302" fill="#e67e22" font-size="11" font-weight="bold">j = 3</text>
  <text x="80" y="302" fill="#888" font-size="11">1 &lt; 2?</text>
  <text x="140" y="302" fill="#e74c3c" font-size="11" font-weight="bold">Yes &#x2192; update min_idx = 3</text>
  <text x="360" y="302" fill="#888" font-size="10">(current min is now 1)</text>

  <!-- j=4: 4 < 1? No -->
  <text x="40" y="322" fill="#e67e22" font-size="11" font-weight="bold">j = 4</text>
  <text x="80" y="322" fill="#888" font-size="11">4 &lt; 1?</text>
  <text x="140" y="322" fill="#f39c12" font-size="11">No &#x2192; min_idx stays 3</text>

  <!-- Scan result: show array with min highlighted -->
  <text x="40" y="350" fill="#e67e22" font-size="12" font-weight="bold">Result:</text>
  <rect x="155" y="336" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="178" y="355" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="207" y="336" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="230" y="355" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="259" y="336" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="355" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="336" width="46" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="334" y="355" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="363" y="336" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="355" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="350" fill="#e74c3c" font-size="12" font-weight="bold">min = 1 at index 3</text>
  <text x="425" y="366" fill="#888" font-size="10">Checked all 4 elements &#x2014; no shortcuts!</text>

  <!-- Divider -->
  <line x1="40" y1="378" x2="860" y2="378" stroke="#f5cba7" stroke-width="1"/>

  <!-- Swap: before → after -->
  <text x="40" y="398" fill="#e67e22" font-size="12" font-weight="bold">Swap:</text>
  <text x="100" y="398" fill="#888" font-size="11">swap(data[0], data[3])</text>
  <text x="290" y="398" fill="#e74c3c" font-size="12" font-weight="bold">swap(5, 1)</text>

  <rect x="155" y="410" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="429" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="207" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="230" y="429" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="259" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="429" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="410" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="334" y="429" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="363" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="429" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <text x="425" y="428" fill="#555" font-size="14">&#x2192;</text>

  <rect x="455" y="410" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="478" y="429" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="507" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="530" y="429" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="559" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="582" y="429" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="611" y="410" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="634" y="429" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="663" y="410" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="686" y="429" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="720" y="428" fill="#27ae60" font-size="10" font-weight="bold">1 locked</text>

  <!-- Divider -->
  <line x1="40" y1="450" x2="860" y2="450" stroke="#f5cba7" stroke-width="1"/>

  <!-- End -->
  <text x="40" y="472" fill="#555" font-size="12" font-weight="bold">End:</text>
  <rect x="155" y="458" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <line x1="205" y1="452" x2="205" y2="492" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="201" y="500" text-anchor="middle" fill="#e67e22" font-size="8">sorted | unsorted</text>
  <rect x="211" y="458" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="234" y="477" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="263" y="458" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="286" y="477" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="458" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="338" y="477" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="367" y="458" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="390" y="477" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="472" fill="#27ae60" font-size="11" font-weight="bold">1 swap this pass</text>

  <!-- ===== i=1 — DETAILED (no swap case) ===== -->
  <rect x="20" y="514.0" width="860" height="140" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="536.0" fill="#e67e22" font-size="14" font-weight="bold">i = 1</text>
  <text x="100" y="536.0" fill="#777" font-size="11">Scan indices 1&#x2013;4 for minimum</text>

  <!-- Scan -->
  <text x="40" y="564.0" fill="#e67e22" font-size="12" font-weight="bold">Scan:</text>
  <rect x="155" y="550.0" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="569.0" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="207" y="550.0" width="46" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="230" y="569.0" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="259" y="550.0" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="569.0" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="550.0" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="334" y="569.0" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="363" y="550.0" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="569.0" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="564.0" fill="#e74c3c" font-size="12" font-weight="bold">min = 2 at index 1</text>

  <!-- Divider -->
  <line x1="40" y1="588" x2="860" y2="588" stroke="#f5cba7" stroke-width="1"/>

  <!-- No swap needed — before → after (same) -->
  <text x="40" y="608.0" fill="#e67e22" font-size="12" font-weight="bold">Swap?</text>
  <text x="100" y="608.0" fill="#f39c12" font-size="12" font-weight="bold">No &#x2192; min is already at index 1</text>

  <text x="40" y="640.0" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="624.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="642.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="169" y="642.0" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="196" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="217" y="642.0" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="265" y="642.0" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="292" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="313" y="642.0" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="350" y="640.0" fill="#555" font-size="14">&#x2192;</text>

  <rect x="380" y="624.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="401" y="642.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="428" y="624.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="449" y="642.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="476" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="497" y="642.0" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="524" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="545" y="642.0" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="572" y="624.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="593" y="642.0" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="627" y="640.0" fill="#27ae60" font-size="11">&#x2190; 2 locked (no swap)</text>

  <!-- ===== i=2 — COMPACT ===== -->
  <rect x="20" y="664.0" width="860" height="70" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="686.0" fill="#e67e22" font-size="14" font-weight="bold">i = 2</text>
  <text x="100" y="686.0" fill="#777" font-size="11">Scan 2&#x2013;4</text>
  <text x="200" y="686.0" fill="#e74c3c" font-size="11" font-weight="bold">min = 4 at index 4</text>
  <text x="370" y="686.0" fill="#e74c3c" font-size="11">swap(data[2], data[4]) &#x2192; swap(8, 4)</text>

  <text x="40" y="720.0" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="704.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="704.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="704.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="217" y="722.0" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="704.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="265" y="722.0" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="292" y="704.0" width="42" height="26" rx="4" fill="#e74c3c"/>
  <text x="313" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>

  <text x="350" y="720.0" fill="#555" font-size="14">&#x2192;</text>

  <rect x="380" y="704.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="401" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="428" y="704.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="449" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="476" y="704.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="497" y="722.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="524" y="704.0" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="545" y="722.0" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="572" y="704.0" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="593" y="722.0" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <text x="627" y="720.0" fill="#27ae60" font-size="11">&#x2190; 4 locked</text>

  <!-- ===== i=3 — COMPACT (last pass) ===== -->
  <rect x="20" y="744.0" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="766.0" fill="#e67e22" font-size="14" font-weight="bold">i = 3</text>
  <text x="100" y="766.0" fill="#777" font-size="11">Scan 3&#x2013;4 (last pass)</text>
  <text x="250" y="766.0" fill="#e74c3c" font-size="11" font-weight="bold">min = 5 at index 3</text>
  <text x="420" y="766.0" fill="#27ae60" font-size="11">Already in position &#x2192; no swap</text>

  <text x="40" y="800.0" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="784.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="802.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="784.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="802.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="784.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="802.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="784.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="802.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="784.0" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="802.0" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="350" y="800.0" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted!</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="834.0" width="860" height="126" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="450" y="858.0" text-anchor="middle" fill="#784212" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="882.0" fill="#2c3e50" font-size="12">&#x2022; Each pass scans the entire unsorted region to find the minimum &#x2014; <tspan font-weight="bold">no shortcuts, always O(n&#xB2;)</tspan></text>
  <text x="50" y="902.0" fill="#2c3e50" font-size="12">&#x2022; Only n&#x2212;1 total swaps (one per pass) &#x2014; <tspan font-weight="bold">fewest writes</tspan> of any quadratic sort</text>
  <text x="50" y="922.0" fill="#2c3e50" font-size="12">&#x2022; <tspan font-weight="bold" fill="#e74c3c">Not stable:</tspan> swapping distant elements can reorder equals. Example: [3a, 3b, 1] &#x2192; [1, 3b, 3a]</text>
  <text x="50" y="942.0" fill="#2c3e50" font-size="12">&#x2022; No best-case improvement &#x2014; even a fully sorted array requires scanning every unsorted element</text>
</svg>
