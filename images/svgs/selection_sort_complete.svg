<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Selection Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Find the minimum in the unsorted region, swap it into the next sorted position. Repeat.</text>

  <!-- Legend -->
  <rect x="580" y="70" width="300" height="106" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="596" y="86" width="16" height="12" rx="3" fill="#e67e22"/>
  <text x="618" y="96" fill="#555" font-size="11">Unsorted (scanning)</text>
  <rect x="596" y="104" width="16" height="12" rx="3" fill="#e74c3c"/>
  <text x="618" y="114" fill="#555" font-size="11">Minimum found</text>
  <rect x="596" y="122" width="16" height="12" rx="3" fill="#27ae60"/>
  <text x="618" y="132" fill="#555" font-size="11">Locked in final position</text>
  <rect x="596" y="140" width="16" height="12" rx="3" fill="#3498db"/>
  <text x="618" y="150" fill="#555" font-size="11">Swapped into position</text>
  <text x="770" y="96" fill="#555" font-size="11" font-weight="bold">O(n&#xB2;) always</text>
  <text x="770" y="114" fill="#555" font-size="11" font-weight="bold">O(1) space</text>
  <text x="770" y="132" fill="#e74c3c" font-size="11" font-weight="bold">Not stable</text>

  <!-- Input array -->
  <text x="40" y="92" fill="#555" font-size="13" font-weight="bold">Input:</text>
  <rect x="110" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="136" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">5</text>
  <rect x="170" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="196" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
  <rect x="230" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="256" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">8</text>
  <rect x="290" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="316" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
  <rect x="350" y="76" width="52" height="32" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="376" y="97" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">4</text>

  <!-- ===== i=0 — DETAILED ===== -->
  <rect x="20" y="190" width="860" height="200" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="212" fill="#e67e22" font-size="14" font-weight="bold">i = 0</text>
  <text x="100" y="212" fill="#777" font-size="11">Scan entire array for minimum, swap it to index 0</text>

  <!-- Scan: show array with min highlighted -->
  <text x="40" y="240" fill="#e67e22" font-size="12" font-weight="bold">Scan:</text>
  <rect x="155" y="226" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="178" y="245" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="207" y="226" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="230" y="245" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="259" y="226" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="245" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="226" width="46" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="334" y="245" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="363" y="226" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="245" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="240" fill="#e74c3c" font-size="12" font-weight="bold">min = 1 at index 3</text>

  <!-- Divider -->
  <line x1="40" y1="264" x2="860" y2="264" stroke="#f5cba7" stroke-width="1"/>

  <!-- Swap: before → after -->
  <text x="40" y="284" fill="#e67e22" font-size="12" font-weight="bold">Swap:</text>
  <text x="100" y="284" fill="#888" font-size="11">swap(data[0], data[3])</text>
  <text x="290" y="284" fill="#e74c3c" font-size="12" font-weight="bold">swap(5, 1)</text>

  <rect x="155" y="296" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="178" y="315" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="207" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="230" y="315" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="259" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="315" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="296" width="46" height="28" rx="4" fill="#e74c3c"/>
  <text x="334" y="315" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="363" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="315" text-anchor="middle" fill="#fff" font-size="13">4</text>

  <text x="425" y="314" fill="#555" font-size="14">&#x2192;</text>

  <rect x="455" y="296" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="478" y="315" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="507" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="530" y="315" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="559" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="582" y="315" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="611" y="296" width="46" height="28" rx="4" fill="#3498db"/>
  <text x="634" y="315" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="663" y="296" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="686" y="315" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="720" y="314" fill="#27ae60" font-size="10" font-weight="bold">1 locked</text>

  <!-- Divider -->
  <line x1="40" y1="336" x2="860" y2="336" stroke="#f5cba7" stroke-width="1"/>

  <!-- End -->
  <text x="40" y="358" fill="#555" font-size="12" font-weight="bold">End:</text>
  <rect x="155" y="344" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="363" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <line x1="205" y1="338" x2="205" y2="378" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="201" y="386" text-anchor="middle" fill="#e67e22" font-size="8">sorted | unsorted</text>
  <rect x="211" y="344" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="234" y="363" text-anchor="middle" fill="#fff" font-size="13">2</text>
  <rect x="263" y="344" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="286" y="363" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="315" y="344" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="338" y="363" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="367" y="344" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="390" y="363" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="430" y="358" fill="#27ae60" font-size="11" font-weight="bold">1 swap this pass</text>

  <!-- ===== i=1 — DETAILED (no swap case) ===== -->
  <rect x="20" y="400" width="860" height="140" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="422" fill="#e67e22" font-size="14" font-weight="bold">i = 1</text>
  <text x="100" y="422" fill="#777" font-size="11">Scan indices 1&#x2013;4 for minimum</text>

  <!-- Scan -->
  <text x="40" y="450" fill="#e67e22" font-size="12" font-weight="bold">Scan:</text>
  <rect x="155" y="436" width="46" height="28" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="178" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="207" y="436" width="46" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="230" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="259" y="436" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="282" y="455" text-anchor="middle" fill="#fff" font-size="13">8</text>
  <rect x="311" y="436" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="334" y="455" text-anchor="middle" fill="#fff" font-size="13">5</text>
  <rect x="363" y="436" width="46" height="28" rx="4" fill="#e67e22"/>
  <text x="386" y="455" text-anchor="middle" fill="#fff" font-size="13">4</text>
  <text x="425" y="450" fill="#e74c3c" font-size="12" font-weight="bold">min = 2 at index 1</text>

  <!-- Divider -->
  <line x1="40" y1="474" x2="860" y2="474" stroke="#f5cba7" stroke-width="1"/>

  <!-- No swap needed — before → after (same) -->
  <text x="40" y="494" fill="#e67e22" font-size="12" font-weight="bold">Swap?</text>
  <text x="100" y="494" fill="#f39c12" font-size="12" font-weight="bold">No &#x2192; min is already at index 1</text>

  <text x="40" y="526" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="510" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="528" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="169" y="528" text-anchor="middle" fill="#fff" font-size="12">2</text>
  <rect x="196" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="217" y="528" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="265" y="528" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="292" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="313" y="528" text-anchor="middle" fill="#fff" font-size="12">4</text>

  <text x="350" y="526" fill="#555" font-size="14">&#x2192;</text>

  <rect x="380" y="510" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="401" y="528" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="428" y="510" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="449" y="528" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="476" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="497" y="528" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="524" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="545" y="528" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="572" y="510" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="593" y="528" text-anchor="middle" fill="#fff" font-size="12">4</text>
  <text x="627" y="526" fill="#27ae60" font-size="11">&#x2190; 2 locked (no swap)</text>

  <!-- ===== i=2 — COMPACT ===== -->
  <rect x="20" y="550" width="860" height="70" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="40" y="572" fill="#e67e22" font-size="14" font-weight="bold">i = 2</text>
  <text x="100" y="572" fill="#777" font-size="11">Scan 2&#x2013;4</text>
  <text x="200" y="572" fill="#e74c3c" font-size="11" font-weight="bold">min = 4 at index 4</text>
  <text x="370" y="572" fill="#e74c3c" font-size="11">swap(data[2], data[4]) &#x2192; swap(8, 4)</text>

  <text x="40" y="606" fill="#888" font-size="11">Start:</text>
  <rect x="100" y="590" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="590" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="590" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="217" y="608" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <rect x="244" y="590" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="265" y="608" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="292" y="590" width="42" height="26" rx="4" fill="#e74c3c"/>
  <text x="313" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>

  <text x="350" y="606" fill="#555" font-size="14">&#x2192;</text>

  <rect x="380" y="590" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="401" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="428" y="590" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="449" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="476" y="590" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="497" y="608" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="524" y="590" width="42" height="26" rx="4" fill="#e67e22"/>
  <text x="545" y="608" text-anchor="middle" fill="#fff" font-size="12">5</text>
  <rect x="572" y="590" width="42" height="26" rx="4" fill="#3498db"/>
  <text x="593" y="608" text-anchor="middle" fill="#fff" font-size="12">8</text>
  <text x="627" y="606" fill="#27ae60" font-size="11">&#x2190; 4 locked</text>

  <!-- ===== i=3 — COMPACT (last pass) ===== -->
  <rect x="20" y="630" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="40" y="652" fill="#e67e22" font-size="14" font-weight="bold">i = 3</text>
  <text x="100" y="652" fill="#777" font-size="11">Scan 3&#x2013;4 (last pass)</text>
  <text x="250" y="652" fill="#e74c3c" font-size="11" font-weight="bold">min = 5 at index 3</text>
  <text x="420" y="652" fill="#27ae60" font-size="11">Already in position &#x2192; no swap</text>

  <text x="40" y="686" fill="#555" font-size="11" font-weight="bold">Final:</text>
  <rect x="100" y="670" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="121" y="688" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="670" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="169" y="688" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="670" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="217" y="688" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">4</text>
  <rect x="244" y="670" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="265" y="688" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <rect x="292" y="670" width="42" height="26" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="313" y="688" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">8</text>
  <text x="350" y="686" fill="#27ae60" font-size="11" font-weight="bold">&#x2190; sorted!</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="720" width="860" height="126" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="450" y="744" text-anchor="middle" fill="#784212" font-size="15" font-weight="bold">Key Takeaways</text>

  <text x="50" y="768" fill="#2c3e50" font-size="12">&#x2022; Each pass scans the entire unsorted region to find the minimum &#x2014; <tspan font-weight="bold">no shortcuts, always O(n&#xB2;)</tspan></text>
  <text x="50" y="788" fill="#2c3e50" font-size="12">&#x2022; Only n&#x2212;1 total swaps (one per pass) &#x2014; <tspan font-weight="bold">fewest writes</tspan> of any quadratic sort</text>
  <text x="50" y="808" fill="#2c3e50" font-size="12">&#x2022; <tspan font-weight="bold" fill="#e74c3c">Not stable:</tspan> swapping distant elements can reorder equals. Example: [3a, 3b, 1] &#x2192; [1, 3b, 3a]</text>
  <text x="50" y="828" fill="#2c3e50" font-size="12">&#x2022; No best-case improvement &#x2014; even a fully sorted array requires scanning every unsorted element</text>
</svg>
