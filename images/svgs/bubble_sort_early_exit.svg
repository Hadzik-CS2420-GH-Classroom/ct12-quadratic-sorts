<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Bubble Sort -- Early Exit Optimization</text>
  <text x="400" y="50" text-anchor="middle" fill="#555" font-size="13">If a full pass makes zero swaps, the array is already sorted -- stop early</text>

  <!-- Already sorted array -->
  <text x="40" y="90" fill="#888" font-size="12" font-weight="bold">Input:</text>
  <rect x="110" y="72" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
  <rect x="178" y="72" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="208" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
  <rect x="246" y="72" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="276" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
  <rect x="314" y="72" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="344" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
  <rect x="382" y="72" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="412" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5</text>

  <text x="480" y="88" fill="#27ae60" font-size="12" font-weight="bold">Already sorted!</text>

  <!-- Pass 1 check -->
  <text x="40" y="140" fill="#888" font-size="12">Pass 1:</text>
  <text x="110" y="140" fill="#555" font-size="12">Compare all adjacent pairs: 1&lt;2, 2&lt;3, 3&lt;4, 4&lt;5</text>
  <text x="480" y="140" fill="#27ae60" font-size="12" font-weight="bold">swapped = false</text>

  <!-- Early exit -->
  <text x="40" y="170" fill="#888" font-size="12">Result:</text>
  <text x="110" y="170" fill="#27ae60" font-size="13" font-weight="bold">No swaps in pass 1 -- break!</text>

  <!-- Comparison boxes -->
  <rect x="40" y="190" width="340" height="48" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="210" text-anchor="middle" fill="#1b5e20" font-size="13" font-weight="bold">With early exit: O(n)</text>
  <text x="210" y="228" text-anchor="middle" fill="#2e7d32" font-size="12">Only 1 pass needed (n-1 comparisons)</text>

  <rect x="420" y="190" width="340" height="48" rx="8" fill="#fce4ec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="590" y="210" text-anchor="middle" fill="#b71c1c" font-size="13" font-weight="bold">Without early exit: O(n^2)</text>
  <text x="590" y="228" text-anchor="middle" fill="#c62828" font-size="12">Would do n passes regardless</text>
</svg>
