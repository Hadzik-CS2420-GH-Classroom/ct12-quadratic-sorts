<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">O(n^2) Sorts -- Side-by-Side Comparison</text>

  <!-- Table header -->
  <rect x="40" y="52" width="720" height="36" rx="6" fill="#2c3e50"/>
  <text x="140" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold"></text>
  <text x="290" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Bubble Sort</text>
  <text x="460" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Insertion Sort</text>
  <text x="640" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Selection Sort</text>

  <!-- Row 1: How it works -->
  <rect x="40" y="88" width="720" height="40" rx="0" fill="#ecf0f1"/>
  <text x="140" y="112" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">How it works</text>
  <text x="290" y="112" text-anchor="middle" fill="#555" font-size="11">Swap adjacent pairs</text>
  <text x="460" y="112" text-anchor="middle" fill="#555" font-size="11">Insert into sorted region</text>
  <text x="640" y="112" text-anchor="middle" fill="#555" font-size="11">Find min, swap to front</text>

  <!-- Row 2: Best case -->
  <rect x="40" y="128" width="720" height="40" rx="0" fill="#fff"/>
  <text x="140" y="152" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Best case</text>
  <text x="290" y="152" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">O(n)</text>
  <text x="460" y="152" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">O(n)</text>
  <text x="640" y="152" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">O(n^2)</text>

  <!-- Row 3: Average case -->
  <rect x="40" y="168" width="720" height="40" rx="0" fill="#ecf0f1"/>
  <text x="140" y="192" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Average case</text>
  <text x="290" y="192" text-anchor="middle" fill="#e74c3c" font-size="12">O(n^2)</text>
  <text x="460" y="192" text-anchor="middle" fill="#e74c3c" font-size="12">O(n^2)</text>
  <text x="640" y="192" text-anchor="middle" fill="#e74c3c" font-size="12">O(n^2)</text>

  <!-- Row 4: Space -->
  <rect x="40" y="208" width="720" height="40" rx="0" fill="#fff"/>
  <text x="140" y="232" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Space</text>
  <text x="290" y="232" text-anchor="middle" fill="#27ae60" font-size="12">O(1)</text>
  <text x="460" y="232" text-anchor="middle" fill="#27ae60" font-size="12">O(1)</text>
  <text x="640" y="232" text-anchor="middle" fill="#27ae60" font-size="12">O(1)</text>

  <!-- Row 5: Stable -->
  <rect x="40" y="248" width="720" height="40" rx="0" fill="#ecf0f1"/>
  <text x="140" y="272" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Stable?</text>
  <text x="290" y="272" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Yes</text>
  <text x="460" y="272" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Yes</text>
  <text x="640" y="272" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">No</text>

  <!-- Border lines -->
  <line x1="40" y1="88" x2="760" y2="88" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="40" y1="288" x2="760" y2="288" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="200" y1="52" x2="200" y2="288" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="380" y1="52" x2="380" y2="288" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="560" y1="52" x2="560" y2="288" stroke="#bdc3c7" stroke-width="1"/>

  <!-- Winner callout -->
  <rect x="40" y="298" width="720" height="34" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="320" text-anchor="middle" fill="#6c3483" font-size="13" font-weight="bold">Winner: Insertion Sort -- O(n) best case, stable, fast on small/nearly-sorted data, used as base case in std::sort</text>
</svg>
