<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Insertion Sort -- Inserting One Element</text>
  <text x="430" y="50" text-anchor="middle" fill="#555" font-size="13">Save the key, shift larger elements right, place the key in its sorted position</text>

  <!-- Sorted/unsorted labels -->
  <rect x="100" y="64" width="204" height="20" rx="3" fill="#d5f5e3"/>
  <text x="202" y="78" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">sorted region</text>
  <rect x="304" y="64" width="272" height="20" rx="3" fill="#fadbd8"/>
  <text x="440" y="78" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">unsorted region</text>

  <!-- Step 1: Before -- key = 62 -->
  <text x="40" y="108" fill="#888" font-size="12" font-weight="bold">Before:</text>
  <rect x="100" y="90" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="90" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="198" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="236" y="90" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="266" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <rect x="304" y="90" width="60" height="36" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2.5"/>
  <text x="334" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">62</text>
  <rect x="372" y="90" width="60" height="36" rx="4" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="402" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">88</text>
  <rect x="440" y="90" width="60" height="36" rx="4" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="470" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">73</text>

  <!-- Key extracted -->
  <text x="550" y="100" fill="#8e44ad" font-size="13" font-weight="bold">key = 62</text>
  <text x="550" y="116" fill="#8e44ad" font-size="11">(saved before shifting)</text>

  <!-- Step 2: Shift 95 right -->
  <text x="40" y="170" fill="#888" font-size="12">Shift 1:</text>
  <rect x="100" y="152" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="175" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="152" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="198" y="175" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="236" y="152" width="60" height="36" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="266" y="175" text-anchor="middle" fill="#bbb" font-size="14" font-style="italic">gap</text>
  <rect x="304" y="152" width="60" height="36" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="334" y="175" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <text x="550" y="170" fill="#e74c3c" font-size="12">95 &gt; 62 -- shift right</text>

  <!-- Step 3: Shift 78 right -->
  <text x="40" y="222" fill="#888" font-size="12">Shift 2:</text>
  <rect x="100" y="204" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="227" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="204" width="60" height="36" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="198" y="227" text-anchor="middle" fill="#bbb" font-size="14" font-style="italic">gap</text>
  <rect x="236" y="204" width="60" height="36" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="266" y="227" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="304" y="204" width="60" height="36" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="334" y="227" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <text x="550" y="222" fill="#e74c3c" font-size="12">78 &gt; 62 -- shift right</text>

  <!-- Step 4: Place key -->
  <text x="40" y="274" fill="#888" font-size="12">Place:</text>
  <rect x="100" y="256" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="130" y="279" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">55</text>
  <rect x="168" y="256" width="60" height="36" rx="4" fill="#8e44ad" stroke="#6c3483" stroke-width="2.5"/>
  <text x="198" y="279" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">62</text>
  <rect x="236" y="256" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="266" y="279" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">78</text>
  <rect x="304" y="256" width="60" height="36" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="334" y="279" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">95</text>
  <text x="550" y="270" fill="#8e44ad" font-size="12" font-weight="bold">55 &lt; 62 -- stop shifting</text>
  <text x="550" y="286" fill="#8e44ad" font-size="12">Place key at data[j+1]</text>

  <!-- Footer -->
  <rect x="30" y="310" width="800" height="60" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="430" y="330" text-anchor="middle" fill="#6c3483" font-size="13" font-weight="bold">Insertion sort: save the key, shift everything larger one position right, place the key</text>
  <text x="430" y="348" text-anchor="middle" fill="#7d3c98" font-size="12">Worst case: key is smallest -- shifts ALL elements (happens when array is reverse-sorted)</text>
  <text x="430" y="363" text-anchor="middle" fill="#7d3c98" font-size="12">Best case: key is already in position -- zero shifts (happens when array is already sorted)</text>
</svg>
